<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Untuk Nabila 💖</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;700&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Poppins',sans-serif;
  text-align:center;
  color:white;
  background:black;
}

/* OPENING */
#startScreen{
  position:fixed;
  width:100%;
  height:100%;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  background:black;
  z-index:999;
}

.start-btn{
  margin-top:20px;
  padding:12px 20px;
  border-radius:25px;
  border:none;
  background:white;
  color:#ff4d6d;
  font-weight:bold;
}

/* MAIN */
.hidden{display:none;}

.container{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  padding:20px;
  background:linear-gradient(-45deg,#ff4d6d,#c9184a,#a4133c,#800f2f);
  background-size:400% 400%;
  animation:bg 15s infinite;
}

@keyframes bg{
  0%{background-position:0%}
  50%{background-position:100%}
  100%{background-position:0%}
}

.text-box{
  background:rgba(0,0,0,0.55);
  padding:20px;
  border-radius:16px;
  max-width:320px;
}

#text{
  transition:opacity 0.3s ease;
  text-shadow:0 2px 8px rgba(0,0,0,0.5);
}

p{
  font-size:20px;
  line-height:1.8;
  font-weight:400;
}

button{
  margin-top:20px;
  padding:12px;
  border:none;
  border-radius:25px;
  background:white;
  color:#ff4d6d;
  font-weight:bold;
}

/* BOUQUET */
.bouquet{
  width:220px;
  margin-top:25px;
}

/* MEMORY */
.memory-main{
  width:240px;
  border-radius:16px;
  transition:opacity 0.5s ease;
}

/* GALLERY */
.gallery{
  display:flex;
  flex-wrap:wrap;
  gap:12px;
  justify-content:center;
  padding:20px;
}
.gallery img{
  width:120px;
  border-radius:12px;
}
</style>
</head>

<body>

<!-- OPENING -->
<div id="startScreen">
  <h2>for you 💖</h2>
  <button class="start-btn" onclick="startApp()">Tap to Start ✨</button>
</div>

<!-- MAIN -->
<div class="container hidden" id="main">
  <div class="text-box">
    <h1>Hai Nabila 💖</h1>
    <p id="text"></p>
  </div>
  <button onclick="next()">Lanjut 👉</button>
</div>

<audio id="lagu1" src="awal.mp3"></audio>
<audio id="lagu2" src="ending.mp3"></audio>

<script>
const text=document.getElementById("text");
const lagu1=document.getElementById("lagu1");
const lagu2=document.getElementById("lagu2");

let step=0;
let isTyping=false;

const memoryPhotos=[
"kenangan1.jpg","kenangan2.jpg","kenangan3.jpg","kenangan4.jpg","kenangan5.jpg",
"kenangan6.jpg","kenangan7.jpg","kenangan8.jpg","kenangan9.jpg","kenangan10.jpg","kenangan11.jpg"
];

const lines=[
"jujur... aku sempet mikir lama sebelum bikin ini 😅",
"soalnya ini bukan hal kecil buat aku...",
"",
"aku pengen jujur sama apa yang aku rasain",
"",
"setiap kita ngobrol...",
"aku selalu ngerasa nyaman 🥹",
"",
"dan entah sejak kapan...",
"kamu jadi orang yang sering aku pikirin",
"(dan anehnya... aku gak pernah keberatan dengan itu 🥹)",
"",
"dan dari situ aku sadar...",
"perasaan ini bukan sekadar biasa",
"",
"and somewhere along the way...",
"I’ve fallen for you... more than I planned 💖",
"",
"and I really want to be with you",
"",
"mau gak kamu jalanin ini sama aku? 🥹"
];

/* START */
function startApp(){
  document.getElementById("startScreen").style.display="none";
  document.getElementById("main").classList.remove("hidden");

  lagu1.volume=0.6;
  lagu1.play().catch(()=>{});

  next(); // langsung mulai
}

/* TYPE */
function typeText(teks){
  if(teks.trim()===""){
    text.innerHTML="<br>";
    return;
  }

  text.textContent="";
  let i=0;
  isTyping=true;

  let interval=setInterval(()=>{
    if(i<teks.length){
      text.textContent+=teks[i++];
    }else{
      clearInterval(interval);
      isTyping=false;
    }
  },35);
}

/* NEXT */
function next(){
  if(isTyping) return;

  step++;

  if(step<=lines.length){
    typeText(lines[step-1]);
  }

  if(step===lines.length){
    showEnding();
  }
}

/* ENDING */
function showEnding(){
  lagu1.pause();
  lagu2.play().catch(()=>{});

  document.getElementById("main").innerHTML=`
  <div class="text-box">
    <h1>💖</h1>
    <p>
      thank you for reading this... 🥹<br><br>
      I really mean everything 💖
    </p>
  </div>

  <button onclick="showMemorySequence()">Lihat Kenangan 💖</button>

  <img src="bouquet.png" class="bouquet">
  `;
}

/* MEMORY */
function showMemorySequence(){
  let index=0;

  document.getElementById("main").innerHTML=`
  <img id="memoryImg" class="memory-main">
  <p>Kenangan kita... 💖</p>
  `;

  let img=document.getElementById("memoryImg");

  function nextImage(){
    if(index < memoryPhotos.length){
      img.src = memoryPhotos[index];
      index++;
      setTimeout(nextImage,1500);
    } else {
      showGallery();
    }
  }

  nextImage();
}

/* GRID */
function showGallery(){
  document.getElementById("main").innerHTML=`
  <h1>Kenangan Kita 💖</h1>
  <div class="gallery"></div>
  `;

  let g=document.querySelector(".gallery");

  memoryPhotos.forEach(src=>{
    let img=document.createElement("img");
    img.src=src;
    g.appendChild(img);
  });
}
</script>

</body>
</html>
