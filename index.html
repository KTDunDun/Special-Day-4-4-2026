<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You 💖</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Poppins',sans-serif;
  text-align:center;
  color:white;
  background:black;
  overflow:hidden;
  padding-top:env(safe-area-inset-top);
  padding-bottom:env(safe-area-inset-bottom);
}

/* OPENING */
#startScreen{
  position:fixed;
  width:100%;
  height:100%;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  background:black;
  z-index:999;
  transition:0.5s;
}

/* MAIN */
.container{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  padding:20px;
  background:linear-gradient(-45deg,#ff4d6d,#c9184a,#ff758f,#ff8fa3);
  background-size:400% 400%;
  animation:bgMove 12s ease-in-out infinite;
  position:relative;
  z-index:2;
}

@keyframes bgMove{
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

/* TEXT */
.text-box{
  background:rgba(0,0,0,0.6);
  padding:18px;
  border-radius:16px;
  max-width:85%;
  margin-bottom:200px;
}

.header-name{
  font-size:14px;
  opacity:0.8;
  margin-bottom:10px;
}

button{
  margin-top:12px;
  padding:10px 16px;
  border:none;
  border-radius:25px;
  background:white;
  color:#ff4d6d;
  font-weight:bold;
  cursor:pointer;
}

/* FOTO UTAMA */
#photo-container{
  display:flex;
  justify-content:center;
}

.main-photo{
  width:190px;
  border-radius:16px;
  opacity:0;
  transform:translateY(20px);
  transition:0.8s ease;
}

/* FOTO JATUH */
.photo-fall{
  position:fixed;
  top:-100px;
  z-index:1;
  pointer-events:none;
  animation:fall linear;
  filter:blur(1px);
}

@keyframes fall{
  to{transform:translateY(110vh) rotate(360deg);}
}

/* ENDING MODE */
.focus-mode{
  filter:brightness(0.7);
  transition:1s;
}

/* BOUQUET */
.bouquet{
  position:fixed;
  bottom:0;
  left:50%;
  transform:translateX(-50%);
  width:100%;
  height:45vh;
  object-fit:contain;
  z-index:3;
  animation:fadeUp 1s ease, float 5s ease-in-out infinite;
}

@keyframes fadeUp{
  from{opacity:0; transform:translate(-50%,120px);}
  to{opacity:1; transform:translate(-50%,0);}
}

@keyframes float{
  0%{transform:translate(-50%,0);}
  50%{transform:translate(-50%,-12px);}
  100%{transform:translate(-50%,0);}
}
</style>
</head>

<body>

<div id="startScreen">
  <h2>just... take a moment 🥹</h2>
  <button onclick="startApp()">Tap to Start ✨</button>
</div>

<div id="main" class="container" style="display:none;">
  <div id="content"></div>
  <div id="photo-container"></div>
</div>

<audio id="lagu1" src="awal.mp3"></audio>
<audio id="lagu2" src="ending.mp3"></audio>

<script>
const content=document.getElementById("content");
const photoContainer=document.getElementById("photo-container");
const main=document.getElementById("main");
const startScreen=document.getElementById("startScreen");
const lagu1=document.getElementById("lagu1");
const lagu2=document.getElementById("lagu2");

let step=0, fallInterval, typing=false;

const lines=[
"jujur... aku mikir lama buat ini 😅",
"ini bukan hal kecil buat aku",
"setiap kita ngobrol...",
"aku selalu ngerasa nyaman 🥹",
"dan entah sejak kapan...",
"kamu jadi orang yang sering aku pikirin",
"I’ve fallen for you... more than I planned 💖",
"aku serius sama perasaan ini",
"mau gak kamu jadi bagian dari cerita ini? 🥹"
];

const memoryPhotos=[
"kenangan1.jpg","kenangan2.jpg","kenangan3.jpg","kenangan4.jpg",
"kenangan5.jpg","kenangan6.jpg","kenangan7.jpg","kenangan8.jpg",
"kenangan9.jpg","kenangan10.jpg","kenangan11.jpg"
];

function startApp(){
  startScreen.style.opacity="0";
  setTimeout(()=>{
    startScreen.style.display="none";
    main.style.display="flex";
    lagu1.play().catch(()=>{});
    setTimeout(showIntro,1800);
  },500);
}

function showIntro(){
  content.innerHTML=`
  <div class="text-box">
  <p>hey... 🥹<br><br>are you ready to know what this really means...? 💖</p>
  </div>
  <button onclick="showMade()">I'm ready 💖</button>`;
}

function showMade(){
  content.innerHTML=`
  <div class="text-box">
  <p>I made this for you... 🥹<br><br>because there are things I’ve been wanting to say... 💖</p>
  </div>
  <button onclick="startStory()">Continue 💖</button>`;
}

function startStory(){
  step=0;
  showPhoto();
  startFalling();
  next();
}

function showPhoto(){
  if(!document.getElementById("mainPhoto")){
    let img=document.createElement("img");
    img.src="foto.jpg";
    img.id="mainPhoto";
    img.className="main-photo";
    photoContainer.appendChild(img);
    setTimeout(()=>{
      img.style.opacity=1;
      img.style.transform="translateY(0)";
    },800);
  }
}

function typeText(t){
  typing=true;
  let el=document.getElementById("text");
  el.textContent="";
  let i=0;

  let inter=setInterval(()=>{
    if(i<t.length){
      el.textContent+=t[i++];
    } else {
      clearInterval(inter);
      typing=false;
    }
  },35);
}

function next(){
  if(typing) return;

  step++;

  content.innerHTML=`
  <div class="text-box">
    <div class="header-name">Hai Nabila Bailey 💕</div>
    <p id="text"></p>
  </div>
  <button onclick="next()">Lanjut 👉</button>
  `;

  typeText(lines[step-1]);

  if(step===lines.length) showChoice();
}

function startFalling(){
  fallInterval=setInterval(()=>{
    let img=document.createElement("img");
    img.src="foto"+(Math.floor(Math.random()*6)+1)+".jpg";
    img.className="photo-fall";
    img.style.left=Math.random()*100+"vw";
    img.style.width=(Math.random()*60+60)+"px";
    img.style.opacity=(Math.random()*0.3+0.2);
    img.style.animationDuration=(Math.random()*4+6)+"s";
    document.body.appendChild(img);
    setTimeout(()=>img.remove(),9000);
  },1800);
}

function stopFalling(){
  clearInterval(fallInterval);
  document.querySelectorAll(".photo-fall").forEach(img=>{
    img.style.opacity="0";
    setTimeout(()=>img.remove(),1000);
  });
}

function showChoice(){
  content.innerHTML=`
  <div class="text-box">
    <p>jadi... mau gak kamu sama aku? 🥹</p>
  </div>
  <button onclick="finalYes()">Mau ❤️</button>`;
}

function finalYes(){
  stopFalling();
  main.classList.add("focus-mode");

  lagu1.pause();
  lagu2.play().catch(()=>{});

  let mainPhoto=document.getElementById("mainPhoto");
  if(mainPhoto) mainPhoto.remove();

  setTimeout(()=>{
    content.innerHTML=`
    <div class="text-box">
      <p>
      thank you for choosing me... 🥹💖<br><br>
      I still can’t believe you said yes...<br><br>
      I may not be perfect,<br>
      but I promise I’ll always try my best for you 🤍<br><br>
      I’ll stay,<br>
      I’ll learn,<br>
      and I’ll grow with you 💖<br><br>
      and in every lifetime...<br>
      I would still choose you 💕
      </p>
    </div>
    <button onclick="showMemory()">Kenangan 💖</button>
    <img src="bouquet.png" class="bouquet">
    `;
  },1000);
}

function showMemory(){
  let i=0;
  content.innerHTML=`<img id="img" class="main-photo">`;
  let img=document.getElementById("img");

  function nextImg(){
    if(i<memoryPhotos.length){
      img.style.opacity=0;
      setTimeout(()=>{
        img.src=memoryPhotos[i++];
        img.style.opacity=1;
      },200);
      setTimeout(nextImg,2000);
    }
  }
  nextImg();
}
</script>

</body>
</html>
