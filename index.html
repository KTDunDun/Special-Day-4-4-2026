<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You 💖</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Poppins',sans-serif;
  text-align:center;
  color:white;
  background:black;
  overflow:hidden;
}

/* OPENING */
#startScreen{
  position:fixed;
  width:100%;
  height:100%;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  background:black;
  z-index:999;
  transition:0.5s;
}

/* MAIN */
.container{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  padding:20px;
  background:linear-gradient(-45deg,#ff4d6d,#c9184a,#a4133c,#800f2f);
  background-size:400% 400%;
  animation:bg 15s ease-in-out infinite;
  position:relative;
  z-index:2;
}

@keyframes bg{
  0%{background-position:0%}
  50%{background-position:100%}
  100%{background-position:0%}
}

/* TEXT */
.text-box{
  background:rgba(0,0,0,0.6);
  padding:20px;
  border-radius:16px;
  max-width:320px;
  margin-bottom:170px;
}

.header-name{
  font-size:15px;
  opacity:0.8;
  margin-bottom:10px;
}

/* BUTTON */
button{
  margin-top:12px;
  padding:12px 18px;
  border:none;
  border-radius:25px;
  background:white;
  color:#ff4d6d;
  font-weight:bold;
  cursor:pointer;
}

/* FOTO UTAMA */
#photo-container{
  margin-top:10px;
}

.main-photo{
  width:230px;
  border-radius:16px;
  opacity:0;
  transform:translateY(20px);
  transition:0.8s ease;
}

/* FOTO JATUH */
.photo-fall{
  position:fixed;
  top:-100px;
  z-index:1;
  opacity:0.35;
  pointer-events:none;
  animation:fall linear;
}

@keyframes fall{
  to{transform:translateY(110vh) rotate(360deg);}
}

/* BOUQUET */
.bouquet{
  position:fixed;
  bottom:0;
  left:50%;
  transform:translateX(-50%);
  width:85%;
  max-width:520px;
  z-index:3;
}

/* EMOJI */
.fall{
  position:fixed;
  top:-20px;
  z-index:5;
  animation:fall linear;
}
</style>
</head>

<body>

<div id="startScreen">
  <h2>just... take a moment 🥹</h2>
  <button onclick="startApp()">Tap to Start ✨</button>
</div>

<div id="main" class="container" style="display:none;">
  <div id="content"></div>
  <div id="photo-container"></div>
</div>

<audio id="lagu1" src="awal.mp3"></audio>
<audio id="lagu2" src="ending.mp3"></audio>

<script>
const content=document.getElementById("content");
const photoContainer=document.getElementById("photo-container");
const main=document.getElementById("main");
const startScreen=document.getElementById("startScreen");
const lagu1=document.getElementById("lagu1");
const lagu2=document.getElementById("lagu2");

let step=0, fallInterval;

/* TEXT */
const lines=[
"jujur... aku mikir lama buat ini 😅",
"ini bukan hal kecil buat aku",
"setiap kita ngobrol...",
"aku selalu ngerasa nyaman 🥹",
"dan entah sejak kapan...",
"kamu jadi orang yang sering aku pikirin",
"I’ve fallen for you... more than I planned 💖",
"aku serius sama perasaan ini",
"mau gak kamu jadi bagian dari cerita ini? 🥹"
];

const memoryPhotos=[
"kenangan1.jpg","kenangan2.jpg","kenangan3.jpg","kenangan4.jpg",
"kenangan5.jpg","kenangan6.jpg","kenangan7.jpg","kenangan8.jpg",
"kenangan9.jpg","kenangan10.jpg","kenangan11.jpg"
];

/* START */
function startApp(){
  startScreen.style.opacity="0";

  setTimeout(()=>{
    startScreen.style.display="none";
    main.style.display="flex";

    lagu1.play().catch(()=>{});
    setTimeout(showIntro,1800);
  },500);
}

/* INTRO */
function showIntro(){
  content.innerHTML=`
  <div class="text-box">
  <p>hey... 🥹<br><br>are you ready to know what this really means...? 💖</p>
  </div>
  <button onclick="showMade()">I'm ready 💖</button>`;
}

function showMade(){
  content.innerHTML=`
  <div class="text-box">
  <p>I made this for you... 🥹<br><br>because there are things I’ve been wanting to say... 💖</p>
  </div>
  <button onclick="startStory()">Continue 💖</button>`;
}

/* STORY */
function startStory(){
  step=0;
  showPhoto();
  startFalling();
  next();
}

/* FOTO UTAMA */
function showPhoto(){
  if(!document.getElementById("mainPhoto")){
    let img=document.createElement("img");
    img.src="foto.jpg";
    img.id="mainPhoto";
    img.className="main-photo";
    photoContainer.appendChild(img);

    setTimeout(()=>{
      img.style.opacity=1;
      img.style.transform="translateY(0)";
    },800);
  }
}

/* TYPEWRITER */
function next(){
  step++;

  content.innerHTML=`
  <div class="text-box">
    <div class="header-name">Hai Nabila Bailey 💕</div>
    <p>${lines[step-1]}</p>
  </div>
  <button onclick="next()">Lanjut 👉</button>
  `;

  if(step===lines.length) showChoice();
}

/* FOTO JATUH */
function startFalling(){
  fallInterval=setInterval(()=>{
    let img=document.createElement("img");
    img.src="foto"+(Math.floor(Math.random()*6)+1)+".jpg";
    img.className="photo-fall";
    img.style.left=Math.random()*100+"vw";
    img.style.width=(Math.random()*40+80)+"px";
    img.style.animationDuration=(Math.random()*3+6)+"s";

    document.body.appendChild(img);
    setTimeout(()=>img.remove(),8000);
  },2000);
}

function stopFalling(){
  clearInterval(fallInterval);
}

/* CHOICE */
function showChoice(){
  content.innerHTML=`
  <div class="text-box">
    <p>jadi... mau gak kamu sama aku? 🥹</p>
  </div>
  <button onclick="finalYes()">Mau ❤️</button>`;
}

/* FINAL */
function finalYes(){
  stopFalling();
  lagu1.pause();
  lagu2.play().catch(()=>{});

  setTimeout(()=>{
    content.innerHTML=`
    <div class="text-box">
      <p>
      thank you for choosing me... 🥹💖<br><br>
      I’ll always try my best for you 🤍<br><br>
      I love you more than you could ever imagine 💕
      </p>
    </div>
    <button onclick="showMemory()">Kenangan 💖</button>
    <img src="bouquet.png" class="bouquet">
    `;
  },600);
}

/* MEMORY */
function showMemory(){
  let i=0;
  content.innerHTML=`<img id="img" class="main-photo">`;
  let img=document.getElementById("img");

  function nextImg(){
    if(i<memoryPhotos.length){
      img.style.opacity=0;
      setTimeout(()=>{
        img.src=memoryPhotos[i++];
        img.style.opacity=1;
      },200);
      setTimeout(nextImg,2000);
    }
  }
  nextImg();
}
</script>

</body>
</html>
