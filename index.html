<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You 💖</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Poppins',sans-serif;
  color:white;
  overflow:hidden;
}

/* INTRO */
#intro{
  position:fixed;
  inset:0;
  background:black;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  z-index:999;
}

/* BG */
#bg-layer{
  position:fixed;
  inset:0;
  z-index:0;
  background:linear-gradient(-45deg,#ff4d6d,#c9184a,#ff758f,#ff8fa3);
  background-size:400% 400%;
  animation:bgMove 12s ease infinite;
}

@keyframes bgMove{
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

#falling-layer, #emoji-layer{
  position:fixed;
  inset:0;
  pointer-events:none;
}
#falling-layer{z-index:1;}
#emoji-layer{z-index:2;}

.container{
  position:relative;
  z-index:3;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  padding:20px;
}

/* TEXT */
.text-box{
  background:rgba(0,0,0,0.6);
  padding:18px;
  border-radius:16px;
  width:90%;
  font-size:16px;
  line-height:1.6;
}

.header-name{
  font-size:15px;
  opacity:0.8;
}

button{
  padding:12px 18px;
  border:none;
  border-radius:25px;
  background:white;
  color:#ff4d6d;
  font-weight:bold;
  margin-top:12px;
}

/* FOTO */
#photo-slot{
  display:flex;
  justify-content:center;
  margin:10px 0;
}

.main-photo{
  width:70%;
  max-width:260px;
  border-radius:16px;
  opacity:0;
  transform:translateY(20px);
  transition:0.8s;
}

.photo-fall{
  position:absolute;
  top:-100px;
  animation:fall linear;
  opacity:0.35;
}

.emoji-fall{
  position:absolute;
  top:-30px;
  animation:fall linear;
  opacity:0.6;
}

@keyframes fall{
  to{transform:translateY(110vh) rotate(360deg);}
}

/* BOUQUET */
.bouquet{
  position:fixed;
  left:50%;
  bottom:-100px;
  transform:translateX(-50%);
  width:110%;
  height:55vh;
  object-fit:contain;
  z-index:4;
}

/* MEMORY */
.memory-wrap{
  display:flex;
  justify-content:center;
  align-items:center;
  height:80vh;
}

.memory-main{
  width:90%;
  border-radius:16px;
  opacity:0;
  transition:0.8s;
}
</style>
</head>

<body>

<div id="intro">
  <h2>hey... 🥹</h2>
  <button onclick="startApp()">tap slowly 💖</button>
</div>

<div id="bg-layer"></div>
<div id="falling-layer"></div>
<div id="emoji-layer"></div>

<div id="main" class="container" style="display:none;">
  <div id="content"></div>
</div>

<audio id="lagu1" src="awal.mp3"></audio>
<audio id="lagu2" src="ending.mp3"></audio>

<script>
const content=document.getElementById("content");
const fallingLayer=document.getElementById("falling-layer");
const emojiLayer=document.getElementById("emoji-layer");

let step=0, typing=false, fallInterval, emojiInterval;

const lines = [
"hey... can you stay for a moment? 🥹",
"aku bikin ini bukan karena iseng...",
"but because there’s something I really want you to know",
"setiap kita ngobrol...",
"aku selalu ngerasa nyaman banget",
"and somehow... I keep looking forward to talking to you",
"entah sejak kapan...",
"kamu jadi orang yang sering aku pikirin",
"aku gak tau ini mulai dari kapan...",
"but I know this feeling is real",
"I think... I really like you 💖",
"not just biasa...",
"but something deeper than that 🥹"
];

function startApp(){
  document.getElementById("intro").style.display="none";
  document.getElementById("main").style.display="flex";

  document.getElementById("lagu1").play().catch(()=>{});

  setTimeout(startStory,1800);
}

function startStory(){
  createPhoto();
  startFalling();
  next();
}

function createPhoto(){
  let img=document.createElement("img");
  img.src="foto.jpg";
  img.id="mainPhoto";
  img.className="main-photo";
  document.body.appendChild(img);

  setTimeout(()=>{
    img.style.opacity=1;
    img.style.transform="translateY(0)";
  },800);
}

function typeText(t){
  typing=true;
  let el=document.getElementById("text");
  el.textContent="";
  let i=0;
  let inter=setInterval(()=>{
    if(i<t.length){
      el.textContent+=t[i++];
    }else{
      clearInterval(inter);
      typing=false;
    }
  },35);
}

function next(){
  if(typing) return;
  step++;

  content.innerHTML=`
  <div class="text-box">
    <div class="header-name">Hai Nabila Bailey 💕</div>
    <p id="text"></p>
  </div>

  <div id="photo-slot"></div>

  <button onclick="next()">Lanjut 👉</button>
  `;

  typeText(lines[step-1]);

  let photo=document.getElementById("mainPhoto");
  let slot=document.getElementById("photo-slot");
  if(photo && slot) slot.appendChild(photo);

  if(step===lines.length) showChoice();
}

function startFalling(){
  fallInterval=setInterval(()=>{
    let img=document.createElement("img");
    img.src="foto"+(Math.floor(Math.random()*6)+1)+".jpg";
    img.className="photo-fall";
    img.style.left=Math.random()*100+"vw";
    img.style.width=(Math.random()*60+60)+"px";
    img.style.animationDuration=(Math.random()*4+6)+"s";
    fallingLayer.appendChild(img);
    setTimeout(()=>img.remove(),9000);
  },1800);
}

function stopFalling(){
  clearInterval(fallInterval);
  fallingLayer.innerHTML="";
}

function startEmoji(){
  emojiInterval=setInterval(()=>{
    let el=document.createElement("div");
    el.className="emoji-fall";
    el.innerHTML=Math.random()>0.5?"💕":"💐";
    el.style.left=Math.random()*100+"vw";
    el.style.fontSize=(Math.random()*12+16)+"px";
    el.style.animationDuration=(Math.random()*3+4)+"s";
    emojiLayer.appendChild(el);
    setTimeout(()=>el.remove(),7000);
  },1200);
}

function showChoice(){
  content.innerHTML=`
  <div class="text-box">
    <p>so... would you like to be with me? 🥹💖</p>
  </div>
  <div id="photo-slot"></div>
  <button onclick="finalYes()">Mau ❤️</button>
  `;

  let photo=document.getElementById("mainPhoto");
  let slot=document.getElementById("photo-slot");
  if(photo && slot) slot.appendChild(photo);
}

function finalYes(){
  stopFalling();
  startEmoji();

  let photo=document.getElementById("mainPhoto");
  if(photo) photo.remove();

  document.getElementById("lagu1").pause();
  document.getElementById("lagu2").play().catch(()=>{});

  setTimeout(()=>{
    content.innerHTML=`
    <div class="text-box">
      <p>
      thank you for choosing me... 🥹💖<br><br>

      jujur... I didn’t expect this moment to feel this real 🤍<br><br>

      maybe I’m not perfect,<br>
      but my feelings for you are real 💖<br><br>

      I’ll try my best for you,<br>
      not only in good times,<br>
      but also when things get hard 🥹<br><br>

      because to me...<br>
      you’re someone truly special<br><br>

      and if I had to choose again...<br>
      I would still choose you 💕
      </p>
    </div>

    <button onclick="showMemory()">Kenangan 💖</button>

    <img src="bouquet.png" class="bouquet">
    `;
  },1000);
}

function showMemory(){
  let i=0;

  content.innerHTML=`
  <div class="memory-wrap">
    <img id="img" class="memory-main">
  </div>
  `;

  let img=document.getElementById("img");

  function nextImg(){
    if(i<11){
      img.style.opacity=0;
      setTimeout(()=>{
        img.src="kenangan"+(i+1)+".jpg";
        img.style.opacity=1;
        i++;
      },300);

      setTimeout(nextImg,3000);
    }
  }

  nextImg();
}
</script>

</body>
</html>
