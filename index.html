<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You 💖</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Poppins',sans-serif;
  text-align:center;
  color:white;
  background:black;
  overflow:hidden;
}

/* OPENING */
#startScreen{
  position:fixed;
  width:100%;
  height:100%;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  background:black;
  z-index:999;
  transition:0.5s;
}

.container{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  padding:20px;
  background:linear-gradient(-45deg,#ff4d6d,#c9184a,#a4133c,#800f2f);
  background-size:400% 400%;
  animation:bg 15s ease-in-out infinite;
  position:relative;
  z-index:2;
}

@keyframes bg{
  0%{background-position:0%}
  50%{background-position:100%}
  100%{background-position:0%}
}

.text-box{
  background:rgba(0,0,0,0.6);
  padding:20px;
  border-radius:16px;
  max-width:320px;
  margin-bottom:120px;
  animation:fadeIn 0.8s ease;
}

@keyframes fadeIn{
  from{opacity:0; transform:translateY(10px);}
  to{opacity:1; transform:translateY(0);}
}

.header-name{
  font-size:16px;
  opacity:0.8;
  margin-bottom:10px;
}

/* BUTTON */
button{
  margin-top:12px;
  padding:12px 18px;
  border:none;
  border-radius:25px;
  background:white;
  color:#ff4d6d;
  font-weight:bold;
  cursor:pointer;
  box-shadow:0 8px 25px rgba(0,0,0,0.3);
  transition:0.3s;
}
button:hover{transform:scale(1.07);}
button:active{transform:scale(0.95);}

.yes-btn{
  background:#ff4d6d;
  color:white;
  animation:pulse 1.5s infinite;
}
@keyframes pulse{
  0%{transform:scale(1);}
  50%{transform:scale(1.08);}
  100%{transform:scale(1);}
}

/* FOTO JATUH */
.photo-fall{
  position:fixed;
  top:-100px;
  z-index:1;
  opacity:0.5;
  pointer-events:none;
  animation:fall linear;
}
@keyframes fall{
  to{transform:translateY(110vh) rotate(360deg);}
}

/* FOTO UTAMA */
.main-photo{
  width:220px;
  border-radius:16px;
  margin-top:18px;
  opacity:0;
  transform:translateY(20px);
  transition:0.8s;
  box-shadow:0 10px 25px rgba(0,0,0,0.4);
}

/* BOUQUET PREMIUM */
.bouquet{
  position:fixed;
  bottom:0;
  left:50%;
  transform:translateX(-50%);
  width:70%;
  max-width:420px;
  z-index:3;
  animation:fadeUp 1s ease, float 4s ease-in-out infinite;
  filter:drop-shadow(0 12px 28px rgba(255,182,193,0.5));
}

@keyframes fadeUp{
  from{opacity:0; transform:translate(-50%,80px);}
  to{opacity:1; transform:translate(-50%,0);}
}

@keyframes float{
  0%{transform:translate(-50%,0);}
  50%{transform:translate(-50%,-10px);}
  100%{transform:translate(-50%,0);}
}

/* MEMORY */
.memory-main{
  width:320px;
  border-radius:16px;
  transition:0.5s;
}

/* EMOJI */
.fall{
  position:fixed;
  top:-20px;
  z-index:5;
  animation:fall linear;
}
</style>
</head>

<body>

<div id="startScreen">
  <h2>just... take a moment 🥹</h2>
  <button onclick="startApp()">Tap to Start ✨</button>
</div>

<div id="main" class="container" style="display:none;"></div>

<audio id="lagu1" src="awal.mp3"></audio>
<audio id="lagu2" src="ending.mp3"></audio>

<script>
const main=document.getElementById("main");
const startScreen=document.getElementById("startScreen");
const lagu1=document.getElementById("lagu1");
const lagu2=document.getElementById("lagu2");

let step=0;

const lines=[
"jujur... aku mikir lama buat ini 😅",
"ini bukan hal kecil buat aku",
"",
"setiap kita ngobrol...",
"aku selalu ngerasa nyaman 🥹",
"",
"dan entah sejak kapan...",
"kamu jadi orang yang sering aku pikirin",
"",
"I’ve fallen for you... more than I planned 💖",
"",
"aku serius sama perasaan ini",
"",
"mau gak kamu jadi bagian dari cerita ini? 🥹"
];

const memoryPhotos=[
"kenangan1.jpg","kenangan2.jpg","kenangan3.jpg","kenangan4.jpg",
"kenangan5.jpg","kenangan6.jpg","kenangan7.jpg","kenangan8.jpg",
"kenangan9.jpg","kenangan10.jpg","kenangan11.jpg"
];

function startApp(){
  startScreen.style.opacity="0";
  setTimeout(()=>{
    startScreen.style.display="none";
    main.style.display="flex";

    lagu1.volume=0;
    lagu1.play().then(()=>{
      let v=0;
      let f=setInterval(()=>{
        if(v<0.6){v+=0.05; lagu1.volume=v;}
        else clearInterval(f);
      },120);
    });

    setTimeout(showIntro,1800);
  },500);
}

function showIntro(){
  main.innerHTML=`
  <div class="text-box">
    <p>
    hey... 🥹<br><br>
    are you ready to know<br>
    what this really means...? 💖
    </p>
  </div>
  <button onclick="showMade()">I'm ready 💖</button>
  `;
}

function showMade(){
  main.innerHTML=`
  <div class="text-box">
    <p>
    I made this for you... 🥹<br><br>
    because there are things<br>
    I’ve been wanting to say... 💖
    </p>
  </div>
  <button onclick="startStory()">Continue 💖</button>
  `;
}

function startStory(){step=0; next();}

function next(){
  step++;

  main.innerHTML=`
  <div class="text-box">
    <div class="header-name">Hai Nabila Bailey 💕</div>
    <p id="text"></p>
  </div>
  <button onclick="next()">Lanjut 👉</button>
  `;

  typeText(lines[step-1]);

  if(step===3){
    let img=document.createElement("img");
    img.src="foto.jpg";
    img.className="main-photo";
    document.querySelector(".text-box").appendChild(img);

    setTimeout(()=>{
      img.style.opacity=1;
      img.style.transform="translateY(0)";
    },800);
  }

  if(step===lines.length) showChoice();
}

function typeText(t){
  let el=document.getElementById("text");
  el.textContent="";
  let i=0;
  let inter=setInterval(()=>{
    if(i<t.length){el.textContent+=t[i++];}
    else clearInterval(inter);
  },35);
}

function showChoice(){
  main.innerHTML=`
  <div class="text-box">
    <p>jadi... mau gak kamu sama aku? 🥹</p>
  </div>
  <button class="yes-btn" onclick="yes()">Mau ❤️</button>
  <button id="noBtn" onmouseover="moveNo()" onclick="moveNo()">Tidak 😢</button>
  `;
}

function moveNo(){
  let b=document.getElementById("noBtn");
  b.style.position="fixed";
  b.style.left=Math.random()*80+"vw";
  b.style.top=Math.random()*80+"vh";
}

function yes(){
  main.innerHTML=`
  <div class="text-box">
    <p>are you really sure...? 🥹💖</p>
  </div>
  <button onclick="finalYes()">Yes 💖</button>
  `;
}

function finalYes(){
  lagu1.pause();
  lagu2.play();

  setTimeout(()=>{
    startLoveRain();
  },500);

  setTimeout(()=>{
    main.innerHTML=`
    <div class="text-box">
      <p>
      thank you for choosing me... 🥹💖<br><br>
      I’ll always try my best for you 🤍<br><br>
      I love you more than you could ever imagine 💕
      </p>
    </div>
    <button onclick="showMemory()">Kenangan 💖</button>
    <img src="bouquet.png" class="bouquet">
    `;
  },500);
}

function startLoveRain(){
  setInterval(()=>{
    let el=document.createElement("div");
    el.className="fall";
    el.innerHTML=Math.random()>0.5?"💕":"💐";
    el.style.left=Math.random()*100+"vw";
    el.style.fontSize="20px";
    el.style.animationDuration="4s";
    document.body.appendChild(el);
    setTimeout(()=>el.remove(),5000);
  },400);
}

function showMemory(){
  let i=0;
  main.innerHTML=`<img id="img" class="memory-main">`;
  let img=document.getElementById("img");

  function nextImg(){
    if(i<memoryPhotos.length){
      img.style.opacity=0;
      setTimeout(()=>{
        img.src=memoryPhotos[i++];
        img.style.opacity=1;
      },200);
      setTimeout(nextImg,2000);
    }
  }
  nextImg();
}

setInterval(()=>{
  let img=document.createElement("img");
  img.src="foto"+(Math.floor(Math.random()*6)+1)+".jpg";
  img.className="photo-fall";
  img.style.left=Math.random()*100+"vw";
  img.style.width="60px";
  img.style.animationDuration="6s";
  document.body.appendChild(img);
  setTimeout(()=>img.remove(),7000);
},3000);

</script>

</body>
</html>
