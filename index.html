<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You 💖</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Poppins',sans-serif;
  color:white;
  overflow:hidden;
}

/* ===== LAYER SYSTEM ===== */
#bg-layer{
  position:fixed;
  inset:0;
  z-index:0;
  background:linear-gradient(-45deg,#ff4d6d,#c9184a,#ff758f,#ff8fa3);
  background-size:400% 400%;
  animation:bgMove 12s ease infinite;
}

@keyframes bgMove{
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

#falling-layer{
  position:fixed;
  inset:0;
  z-index:1;
  pointer-events:none;
}

#emoji-layer{
  position:fixed;
  inset:0;
  z-index:2;
  pointer-events:none;
}

/* ===== MAIN ===== */
.container{
  position:relative;
  z-index:3;

  max-width:520px;
  margin:auto;
  min-height:100vh;

  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  padding:20px;

  border-radius:20px;
  box-shadow:0 0 80px rgba(255,105,135,0.3);
  backdrop-filter:blur(6px);
}

/* TEXT */
.text-box{
  background:rgba(0,0,0,0.6);
  padding:18px;
  border-radius:16px;
  max-width:100%;
  margin-bottom:10px;
  font-size:17px;
  line-height:1.6;
}

.header-name{
  font-size:16px;
  opacity:0.8;
}

/* BUTTON */
button{
  padding:12px 20px;
  border:none;
  border-radius:25px;
  background:white;
  color:#ff4d6d;
  font-weight:bold;
  cursor:pointer;
  margin-top:10px;
}

/* FOTO SLOT */
#photo-slot{
  display:flex;
  justify-content:center;
  margin:10px 0;
}

/* FOTO UTAMA */
.main-photo{
  width:260px;
  border-radius:16px;
  opacity:0;
  transform:translateY(20px);
  transition:0.8s ease;
  box-shadow:0 10px 40px rgba(255,182,193,0.4);
}

/* FOTO JATUH */
.photo-fall{
  position:absolute;
  top:-100px;
  animation:fall linear;
  opacity:0.35;
}

@keyframes fall{
  to{transform:translateY(110vh) rotate(360deg);}
}

/* EMOJI */
.emoji-fall{
  position:absolute;
  top:-30px;
  animation:fall linear;
  opacity:0.6;
}

/* BOUQUET */
.bouquet{
  position:fixed;
  left:50%;
  bottom:-100px;
  transform:translateX(-50%);
  width:110%;
  height:60vh;
  object-fit:contain;
  z-index:4;
}

/* MEMORY */
.memory-wrap{
  display:flex;
  justify-content:center;
  align-items:center;
  height:80vh;
}

.memory-main{
  width:90vw;
  max-width:420px;
  border-radius:18px;
  opacity:0;
  transition:0.8s ease;
}
</style>
</head>

<body>

<div id="bg-layer"></div>
<div id="falling-layer"></div>
<div id="emoji-layer"></div>

<div id="main" class="container">
  <div id="content"></div>
</div>

<audio id="lagu1" src="awal.mp3"></audio>
<audio id="lagu2" src="ending.mp3"></audio>

<script>
const content=document.getElementById("content");
const fallingLayer=document.getElementById("falling-layer");
const emojiLayer=document.getElementById("emoji-layer");

let step=0, typing=false, fallInterval, emojiInterval;

const lines=[
"jujur... aku mikir lama buat ini 😅",
"ini bukan hal kecil buat aku",
"setiap kita ngobrol...",
"aku selalu ngerasa nyaman 🥹",
"dan entah sejak kapan...",
"kamu jadi orang yang sering aku pikirin",
"I’ve fallen for you... more than I planned 💖",
"aku serius sama perasaan ini",
"mau gak kamu jadi bagian dari cerita ini? 🥹"
];

const memoryPhotos=[
"kenangan1.jpg","kenangan2.jpg","kenangan3.jpg",
"kenangan4.jpg","kenangan5.jpg","kenangan6.jpg",
"kenangan7.jpg","kenangan8.jpg","kenangan9.jpg",
"kenangan10.jpg","kenangan11.jpg"
];

startStory();

/* ===== TYPE ===== */
function typeText(t){
  typing=true;
  let el=document.getElementById("text");
  el.textContent="";
  let i=0;

  let inter=setInterval(()=>{
    if(i<t.length){
      el.textContent+=t[i++];
    }else{
      clearInterval(inter);
      typing=false;
    }
  },35);
}

/* ===== STORY ===== */
function startStory(){
  createPhoto();
  startFalling();
  next();
}

function createPhoto(){
  let img=document.createElement("img");
  img.src="foto.jpg";
  img.id="mainPhoto";
  img.className="main-photo";
  document.body.appendChild(img);

  setTimeout(()=>{
    img.style.opacity=1;
    img.style.transform="translateY(0)";
  },800);
}

function next(){
  if(typing) return;
  step++;

  content.innerHTML=`
  <div class="text-box">
    <div class="header-name">Hai Nabila Bailey 💕</div>
    <p id="text"></p>
  </div>

  <div id="photo-slot"></div>

  <button onclick="next()">Lanjut 👉</button>
  `;

  typeText(lines[step-1]);

  let photo=document.getElementById("mainPhoto");
  let slot=document.getElementById("photo-slot");
  if(photo && slot) slot.appendChild(photo);

  if(step===lines.length) showChoice();
}

/* ===== FALLING ===== */
function startFalling(){
  fallInterval=setInterval(()=>{
    let img=document.createElement("img");
    img.src="foto"+(Math.floor(Math.random()*6)+1)+".jpg";
    img.className="photo-fall";
    img.style.left=Math.random()*100+"vw";
    img.style.width=(Math.random()*60+60)+"px";
    img.style.animationDuration=(Math.random()*4+6)+"s";
    fallingLayer.appendChild(img);
    setTimeout(()=>img.remove(),9000);
  },1800);
}

function stopFalling(){
  clearInterval(fallInterval);
  fallingLayer.innerHTML="";
}

/* ===== EMOJI ===== */
function startEmoji(){
  emojiInterval=setInterval(()=>{
    let el=document.createElement("div");
    el.className="emoji-fall";
    el.innerHTML=Math.random()>0.5?"💕":"💐";
    el.style.left=Math.random()*100+"vw";
    el.style.fontSize=(Math.random()*12+16)+"px";
    el.style.animationDuration=(Math.random()*3+4)+"s";
    emojiLayer.appendChild(el);
    setTimeout(()=>el.remove(),7000);
  },1200);
}

/* ===== CHOICE ===== */
function showChoice(){
  content.innerHTML=`
  <div class="text-box">
    <p>mau gak kamu sama aku? 🥹</p>
  </div>
  <div id="photo-slot"></div>
  <button onclick="finalYes()">Mau ❤️</button>
  `;

  let photo=document.getElementById("mainPhoto");
  let slot=document.getElementById("photo-slot");
  if(photo && slot) slot.appendChild(photo);
}

/* ===== ENDING ===== */
function finalYes(){
  stopFalling();
  startEmoji();

  let photo=document.getElementById("mainPhoto");
  if(photo) photo.remove();

  document.getElementById("lagu1").pause();
  document.getElementById("lagu2").play().catch(()=>{});

  setTimeout(()=>{
    content.innerHTML=`
    <div class="text-box">
      <p>
      thank you for choosing me... 🥹💖<br><br>
      I still can’t believe you said yes...<br><br>
      I will always try my best for you 🤍<br><br>
      and in every lifetime... I would still choose you 💕
      </p>
    </div>

    <button onclick="showMemory()">Kenangan 💖</button>

    <img src="bouquet.png" class="bouquet">
    `;
  },1000);
}

/* ===== MEMORY ===== */
function showMemory(){
  let i=0;

  content.innerHTML=`
  <div class="memory-wrap">
    <img id="img" class="memory-main">
  </div>
  `;

  let img=document.getElementById("img");

  function nextImg(){
    if(i<memoryPhotos.length){
      img.style.opacity=0;

      setTimeout(()=>{
        img.src=memoryPhotos[i++];
        img.style.opacity=1;
      },300);

      setTimeout(nextImg,3000);
    }
  }

  nextImg();
}
</script>

</body>
</html>
